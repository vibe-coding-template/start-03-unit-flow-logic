<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指令流邏輯：單次觸發與重複發送 | Vibe Coding Classroom</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="badge">Unit 03</div>
            <h1>指令流邏輯 <span>Temporal Logic & Safety</span></h1>
            <p class="subtitle">掌控定時器節奏，實作失效安全機制</p>
        </header>

        <main>
            <section class="control-panel">
                <div class="section-header">
                    <h2>控制面板 <small>Control Panel</small></h2>
                </div>
                <div class="controller-grid">
                    <div class="d-pad">
                        <button id="btn-up" class="ctrl-btn up" data-key="ArrowUp">W</button>
                        <div class="horizontal">
                            <button id="btn-left" class="ctrl-btn left" data-key="ArrowLeft">A</button>
                            <button id="btn-down" class="ctrl-btn down" data-key="ArrowDown">S</button>
                            <button id="btn-right" class="ctrl-btn right" data-key="ArrowRight">D</button>
                        </div>
                    </div>
                    <div class="settings">
                        <div class="input-group">
                            <label for="interval-input">發送頻率 (ms)</label>
                            <input type="number" id="interval-input" value="100" min="10" max="1000">
                        </div>
                        <div class="status-indicator">
                            <div id="status-dot" class="dot"></div>
                            <span id="status-text">系統就緒</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="monitor-panel">
                <div class="section-header">
                    <h2>實時指令日誌 <small>Event Logger</small></h2>
                    <button id="clear-log" class="text-btn">清除日誌</button>
                </div>
                <div id="event-log" class="log-container">
                    <div class="log-entry system">系統初始化完成...</div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 Vibe Coding Classroom - 打造工程師的邏輯直覺</p>
        </footer>
    </div>

    <script src="js/logic.js"></script>
</body>
</html>
